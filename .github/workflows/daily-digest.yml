name: Daily Digest Dispatch (Consumer-side, CI mode)

on:
  schedule:
    - cron: '30 2 * * *'   # UTC 02:30 = 10:30 Beijing
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install crawler deps
        run: pip install -r crawlers/requirements.txt

      - name: Verify all required secrets are set
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: |
          missing=""
          [ -z "$OPENAI_API_KEY" ]   && missing="$missing OPENAI_API_KEY"
          [ -z "$LARK_APP_ID" ]      && missing="$missing LARK_APP_ID"
          [ -z "$LARK_APP_SECRET" ]  && missing="$missing LARK_APP_SECRET"
          [ -z "$FEISHU_CHAT_ID" ]   && missing="$missing FEISHU_CHAT_ID"
          if [ -n "$missing" ]; then
            echo "✗ Missing secrets:$missing"
            exit 1
          fi
          echo "✓ All 4 required secrets present"

      - name: Generate ephemeral config.json from secrets
        run: |
          cat > config.json << 'INNEREOF'
          {
            "feed_url": "https://raw.githubusercontent.com/tang730125633/tang-energy-feed/main/feed/feed-digest.json",
            "feishu": {
              "chat_id": "__FEISHU_CHAT_ID__",
              "identity": "bot"
            },
            "ai": {
              "provider": "openai",
              "base_url": "https://api.openai.com/v1",
              "model": "gpt-4o-mini",
              "api_key_env": "OPENAI_API_KEY",
              "temperature": 0.3,
              "response_format_json": true
            },
            "lookback_hours": 48
          }
          INNEREOF
          python3 -c "
          import json, os
          with open('config.json') as f:
              c = json.load(f)
          c['feishu']['chat_id'] = os.environ['FEISHU_CHAT_ID']
          with open('config.json', 'w') as f:
              json.dump(c, f, ensure_ascii=False, indent=2)
          print('✓ config.json generated')
          "
        env:
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}

      - name: Run the 6-step delivery pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        run: bash scripts/run.sh

      - name: Cleanup
        if: always()
        run: rm -f config.json

      - name: Notify on pipeline failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bash scripts/notify.sh \
            "tang-energy-feed digest dispatch FAILED" \
            "Daily digest pipeline failed at \${{ github.server_url }}/\${{ github.repository }}/actions/runs/\${{ github.run_id }}"
        continue-on-error: true
