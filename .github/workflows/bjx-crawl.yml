name: Playwright Crawl (bjx + ne21)

# Runs the JS-challenge-gated sources (bjx, ne21) using a Playwright
# headless Chromium. This is separate from daily-crawl.yml because:
#
#   1. Playwright is heavy (~400MB for Chromium download, several minutes
#      of boot time), and we don't want to slow down the main crawl
#   2. JS-challenge sources are flaky. If they fail, we don't want to
#      block the main daily feed
#   3. These sources need a longer timeout (the daily-crawl has a 10min
#      timeout, this one gets 15)
#
# Schedule: runs 1 hour BEFORE the main daily-crawl (05:00 BJT = 21:00 UTC)
# so that when daily-crawl.yml aggregates at 06:00 BJT, the fresh bjx/ne21
# data is already committed to main and can be picked up.

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = 05:00 Beijing time (1h before main)
  workflow_dispatch:

permissions:
  contents: write

# Avoid concurrent runs which would race on feed/*.json commits
concurrency:
  group: playwright-crawl
  cancel-in-progress: false

jobs:
  playwright-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install -r crawlers/requirements-playwright.txt
          playwright install --with-deps chromium

      - name: Crawl bjx (may fail if WAF doesn't resolve from GitHub IP)
        run: |
          python3 crawlers/bjx_playwright.py > feed/feed-bjx.json || {
            echo '{"source":"bjx.com.cn","sourceName":"北极星电力网","generatedAt":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","articles":[],"stats":{"articleCount":0},"errors":["playwright crawl failed with non-zero exit"]}' > feed/feed-bjx.json
          }

      - name: Crawl ne21 (may fail if JS challenge doesn't resolve)
        run: |
          python3 crawlers/ne21_playwright.py > feed/feed-ne21.json || {
            echo '{"source":"ne21.com","sourceName":"世纪新能源网","generatedAt":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'","articles":[],"stats":{"articleCount":0},"errors":["playwright crawl failed with non-zero exit"]}' > feed/feed-ne21.json
          }

      - name: Show results
        run: |
          echo "=== bjx ==="
          python3 -c "import json; d=json.load(open('feed/feed-bjx.json')); print(f'  articles: {d[\"stats\"][\"articleCount\"]}'); print(f'  errors: {d.get(\"errors\", [])}')"
          echo "=== ne21 ==="
          python3 -c "import json; d=json.load(open('feed/feed-ne21.json')); print(f'  articles: {d[\"stats\"][\"articleCount\"]}'); print(f'  errors: {d.get(\"errors\", [])}')"

      - name: Commit and push
        run: |
          git config user.name "playwright-bot"
          git config user.email "playwright-bot@users.noreply.github.com"
          git add feed/feed-bjx.json feed/feed-ne21.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(feed): playwright crawl $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Pull-and-push pattern handles the rare case where daily-crawl
            # committed first
            git pull --rebase origin main || true
            git push
          fi
