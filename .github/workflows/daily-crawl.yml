name: Daily Energy Feed

# Run every day at 22:00 UTC = 06:00 Beijing time.
#
# Direct-scrape sources (no JS challenge):
#   - cpnn.com.cn       (电网头条)
#   - nea.gov.cn        (国家能源局)
#   - cjys.net          (长江铜价)
#   - iesplaza.com      (综合能源服务网 — currently broken, kept as placeholder)
#   - china5e.com       (中国能源网 — 7×24 fallback)
#   - xinhuanet.com     (新华社能源频道 — NEW, policy-first)
#   - chinapower.org.cn (中国电力网 — NEW, industry news)
#
# JS-challenge sources live in bjx-crawl.yml (runs 1h earlier via Playwright):
#   - bjx.com.cn, ne21.com
#
# Post-processing chain:
#   1. Crawl all direct-scrape sources
#   2. Aggregate → feed-digest.json + feed-central-energy.json
#   3. Enrich summaries
#   4. Quality check
#   5. Commit + push

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crawlers/requirements.txt

      # --- Existing direct-scrape crawlers ---

      - name: Crawl cpnn (电网头条)
        run: python3 crawlers/cpnn.py > feed/feed-cpnn.json

      - name: Crawl nea (国家能源局)
        run: python3 crawlers/nea.py > feed/feed-nea.json

      - name: Crawl copper (长江铜价)
        run: python3 crawlers/copper.py > feed/feed-copper.json

      - name: Crawl iesplaza (综合能源服务网) [placeholder — connection issues]
        run: python3 crawlers/iesplaza.py > feed/feed-iesplaza.json
        continue-on-error: true

      - name: Crawl china5e (中国能源网 — 7×24 fallback)
        run: python3 crawlers/china5e.py > feed/feed-china5e.json

      # --- New stable sources (replacing bjx + iesplaza when they break) ---

      - name: Crawl xinhua_energy (新华社能源频道 — policy-first, no WAF)
        run: python3 crawlers/xinhua_energy.py > feed/feed-xinhua.json

      - name: Crawl chinapower (中国电力网 — industry news, 20-40 articles/day)
        run: python3 crawlers/chinapower.py > feed/feed-chinapower.json

      # --- JS-challenge crawlers: use placeholders if Playwright workflow
      # hasn't produced the files yet ---

      - name: Ensure feed-bjx.json exists (placeholder if playwright workflow hasn't run)
        run: |
          if [ ! -f feed/feed-bjx.json ]; then
            python3 crawlers/bjx.py > feed/feed-bjx.json
          fi

      - name: Ensure feed-ne21.json exists (placeholder)
        run: |
          if [ ! -f feed/feed-ne21.json ]; then
            python3 crawlers/ne21.py > feed/feed-ne21.json
          fi

      # --- Aggregate ---

      - name: Aggregate (produces feed-digest.json + feed-central-energy.json)
        run: python3 crawlers/aggregate.py feed/ > feed/feed-digest.json

      # --- Enrich summaries (best-effort) ---

      - name: Enrich summaries
        run: python3 crawlers/enrich_summaries.py feed/feed-digest.json
        continue-on-error: true

      # --- Quality check ---

      - name: Quality check
        id: quality
        run: bash scripts/quality_check.sh feed/feed-digest.json
        continue-on-error: true

      - name: Notify on low quality
        if: steps.quality.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bash scripts/notify.sh \
            "tang-energy-feed quality warning" \
            "Today's crawl produced a low-quality feed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        continue-on-error: true

      - name: Show final stats
        run: bash scripts/show_stats.sh

      # --- Commit ---

      - name: Commit and push if feed changed
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add feed/
          if git diff --staged --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "chore(feed): daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi

      - name: Notify on pipeline failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          bash scripts/notify.sh \
            "tang-energy-feed CRAWL FAILED" \
            "Daily crawl workflow failed. Investigate: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        continue-on-error: true
